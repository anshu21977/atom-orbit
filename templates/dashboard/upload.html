{% extends 'base.html' %}
{% block content %}
<h2>Upload New PDF</h2>
<form method="post" enctype="multipart/form-data" class="form-card">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn">Upload</button>
  <a href="{% url 'dashboard' %}" class="btn" style="background:#888;">Cancel</a>
</form>
{% endblock %}
