{% extends 'base.html' %}
{% block content %}
<h2>Confirm Delete</h2>
<p>Are you sure you want to delete <strong>{{ pdf.title }}</strong>?</p>
<form method="post">{% csrf_token %}
  <button type="submit" class="btn" style="background:#d33;">Yes, Delete</button>
  <a href="{% url 'dashboard' %}" class="btn" style="background:#888;">Cancel</a>
</form>
{% endblock %}
