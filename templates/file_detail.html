{% extends 'base.html' %}

{% block content %}
<div class="container">
  <h2>{{ file.title }}</h2>
  <p>Class: {{ file.classroom.name }}</p>
  <p>Subject: {{ file.subject.name }}</p>
  <p>Category: {{ file.get_category_display }}</p>

  <a href="{{ file.file.url }}" class="btn" download>Download PDF</a>
</div>
{% endblock %}
