{% extends 'base.html' %}
{% block content %}

<section class="achievements">
  <h2>🏆 All Achievers</h2>

  <div class="achievement-grid">
    {% for student in achievers %}
    <div class="achievement-card">
      <img src="{{ achiever.image.url }}" alt="{{ achiever.name }}">

      <h3>{{ student.name }}</h3>
      <p>Class {{ student.class_name }}</p>

      <span>{{ student.score }}%</span>
    </div>
    {% endfor %}
  </div>
</section>

{% endblock %}
